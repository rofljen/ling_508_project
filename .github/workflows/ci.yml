name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:5.7
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: ling_classifier
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent" 
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.9
          
      - name: Build and Start Services
        run: |
          docker-compose up -d
          sleep 10  # Wait for services to initialize

      - name: Copy SQL File and Initialize Database
        run: |
          # Copy SQL file to the MySQL container
          docker cp ./db/init.sql $(docker ps -q -f name=mysql):/tmp/init.sql
          # Run the SQL file inside the MySQL container
          docker exec -i $(docker ps -q -f name=mysql) mysql -u root -proot ling_classifier < /tmp/init.sql

      - name: Run Tests
        run: |
          docker-compose exec app pytest --maxfail=1 --disable-warnings -q
