name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:5.7
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: ling_classifier
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent" 
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.9

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Copy SQL file to MySQL container
        run: |
          docker-compose up -d
          docker cp ./db/init.sql $(docker ps -q -f name=mysql):/tmp/init.sql

      - name: Load SQL script
        run: |
          docker exec -i $(docker ps -q -f name=mysql) mysql -u root -proot ling_classifier < /tmp/init.sql

      - name: Run tests
        run: |
          docker-compose exec app pytest --maxfail=1 --disable-warnings -q
